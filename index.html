<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MBTI 人格测试</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="bg-glow"></div>

  <main class="container">
    <!-- 首页 -->
    <section id="home" class="screen active">
      <div class="hero">
        <span class="badge">16 种人格类型</span>
        <h1>发现你的<span class="gradient">MBTI</span>密码</h1>
        <p>基于 MBTI 理论 · 16 种人格 · 了解真实的自己</p>
        <div class="type-preview"><span>M</span><span>B</span><span>T</span><span>I</span></div>
        <button class="btn" onclick="startTest()">
          开始测试 <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </button>
      </div>
    </section>

    <!-- 测试页 -->
    <section id="test" class="screen">
      <div class="progress-wrap">
        <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
        <span class="progress-num" id="progressText">1 / 32</span>
      </div>
      <div class="q-card">
        <p class="q-text" id="questionText"></p>
        <div class="q-options" id="optionsContainer"></div>
      </div>
    </section>

    <!-- 结果页 -->
    <section id="result" class="screen">
      <div class="r-card">
        <div class="r-type" id="resultType"></div>
        <div class="r-role" id="resultRole"></div>
        <p class="r-desc" id="resultDesc"></p>

        <div class="r-section">
          <h3>人格分析</h3>
          <div class="r-traits">
            <div class="trait-col" id="rStrengths"></div>
            <div class="trait-col" id="rGrowth"></div>
          </div>
        </div>

        <div class="r-section">
          <h3>适合的职业方向</h3>
          <p class="r-careers" id="rCareers"></p>
        </div>

        <div class="r-section">
          <h3>评分详情 <span class="scoring-hint" id="scoringHint"></span></h3>
          <div class="r-bars" id="resultBars"></div>
        </div>

        <button class="btn" onclick="resetTest()">
          重新测试 <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M1 4v6h6M23 20v-6h-6"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/></svg>
        </button>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
